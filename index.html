<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Olma Store</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --hint-color: #888888;
            --button-color: #0071e3;
            --card-bg-color: #ffffff;
            --border-color: #e5e5ea;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 16px; padding-bottom: 100px;
        }

        .header { margin-bottom: 20px; text-align: center; }
        
        .categories-container {
            display: flex; overflow-x: auto; gap: 10px;
            padding-bottom: 15px; scrollbar-width: none;
        }

        .category-chip {
            padding: 8px 16px; background: #f2f2f7; border-radius: 20px;
            font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        .category-chip.active { background: #000; color: #fff; }

        .product-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }

        .product-card {
            background: var(--card-bg-color); border-radius: 16px;
            padding: 12px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center;
        }

        .product-image { width: 100%; aspect-ratio: 1; object-fit: contain; margin-bottom: 8px; }
        .product-name { font-size: 14px; font-weight: 600; text-align: center; height: 40px; overflow: hidden; }
        .product-price { color: var(--hint-color); font-size: 13px; margin: 8px 0; }

        .btn-add {
            background: var(--button-color); color: #fff; border: none;
            width: 100%; padding: 8px; border-radius: 10px; font-weight: 600;
        }

        .controls {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; background: #f2f2f7; border-radius: 10px; padding: 4px;
        }

        .btn-ctrl {
            background: #fff; border: 1px solid #ddd; width: 30px; height: 30px;
            border-radius: 50%; font-weight: bold; cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); transition: 0.3s; z-index: 1000;
        }
        .modal.active { bottom: 0; }
        .modal-content {
            position: absolute; bottom: 0; background: #fff; width: 100%;
            border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box;
        }

        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
