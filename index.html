<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olma Store</title>
    <!-- Telegram WebApp Library -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Modern Apple-style Design (Clean UI) - Forced White Theme */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --hint-color: #888888;
            --button-color: #0071e3;
            --button-text-color: #ffffff;
            --card-bg-color: #ffffff;
            --border-color: #e5e5ea;
            --active-category-bg: #000000;
            --active-category-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            padding-bottom: 90px;
            /* Space for the Telegram MainButton */
            -webkit-font-smoothing: antialiased;
        }

        /* Top Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Categories Bar (Horizontal Scroll) */
        .categories-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 12px;
            margin-bottom: 16px;
            /* Hide scrollbar */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .categories-container::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 16px;
            background-color: #f2f2f7;
            color: var(--text-color);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-chip.active {
            background-color: var(--active-category-bg);
            color: var(--active-category-text);
        }

        /* 18+ Warning Banner */
        .warning-banner {
            display: none;
            background-color: #fff0f0;
            color: #d93025;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            align-items: center;
            border: 1px solid #fce8e6;
        }

        .warning-banner.show {
            display: flex;
        }

        /* Product Grid: 2 Columns */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* Product Card */
        .product-card {
            background-color: var(--card-bg-color);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .product-card:active {
            transform: scale(0.96);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
            background-color: #f5f5f7;
            padding: 8px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            text-align: center;
            line-height: 1.2;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-price {
            font-size: 13px;
            color: var(--hint-color);
            font-weight: 500;
            margin-bottom: 12px;
        }

        /* +/- Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background-color: #f2f2f7;
            border-radius: 20px;
            padding: 4px;
        }

        .btn-control {
            background-color: #ffffff;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            width: 28px;
            height: 28px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: background-color 0.1s, transform 0.1s;
        }

        .btn-control:active {
            background-color: #e5e5ea;
            transform: scale(0.9);
        }

        .quantity {
            font-size: 14px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
            color: var(--text-color);
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🍎 Olma Store</h1>
    </div>

    <!-- Categories -->
    <div class="categories-container" id="categoryBar">
        <div class="category-chip active" onclick="filterCategory('Hammasi')">Hammasi</div>
        <div class="category-chip" onclick="filterCategory('Oziq-ovqat')">Oziq-ovqat</div>
        <div class="category-chip" onclick="filterCategory('Ichimliklar')">Ichimliklar</div>
        <div class="category-chip" onclick="filterCategory('Alkogol')">Alkogol</div>
        <div class="category-chip" onclick="filterCategory('Tamaki')">Tamaki</div>
    </div>

    <!-- 18+ Warning -->
    <div class="warning-banner" id="ageWarning">
        ⚠️ Diqqat: Bu bo'limdagi mahsulotlar faqat 18 yoshga to'lganlar uchun (18+ mahsulotlar).
    </div>

    <!-- Products Grid -->
    <div class="grid-container" id="productGrid">
        <!-- Products generated by JS -->
    </div>

    <script>
        // Init Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen

        tg.backgroundColor = "#ffffff";
        tg.headerColor = "#ffffff";

        // Current UI State
        let currentCategory = 'Hammasi';
        let cart = {}; // { productId: quantity }

        // MOCK DATA (Categories aligned with user's backend DB)
        const allProducts = [
            { id: 1, name: "IPhone 15 Pro Max", price: 15000000, category: "Telefon", img: "https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-finish-select-202309-6-7inch-naturaltitanium?wid=2560&hei=1440&fmt=p-jpg&qlt=80&.v=1692845702708" },
            { id: 2, name: "Qora Non", price: 4000, category: "Oziq-ovqat", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Non" },
            { id: 3, name: "Coca Cola 1.5L", price: 12000, category: "Ichimliklar", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Cola" },
            { id: 4, name: "Fanta 1.5L", price: 12000, category: "Ichimliklar", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Fanta" },
            { id: 5, name: "Qurbonobod Pivo", price: 25000, category: "Alkogol", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Pivo" },
            { id: 6, name: "Marlboro Gold", price: 30000, category: "Tamaki", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Marlboro" },
            { id: 7, name: "Snickers", price: 9000, category: "Oziq-ovqat", img: "https://via.placeholder.com/150/f5f5f7/000000?text=Snickers" }
        ];

        function formatPrice(price) {
            return price.toLocaleString('uz-UZ') + " so'm";
        }

        function filterCategory(categoryName) {
            currentCategory = categoryName;

            // Highlight active chip
            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(chip => {
                if (chip.innerText === categoryName) {
                    chip.classList.add('active');
                    // Scroll active to view
                    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    chip.classList.remove('active');
                }
            });

            // Show config for Disclaimer
            const warningBanner = document.getElementById('ageWarning');
            if (categoryName === 'Alkogol' || categoryName === 'Tamaki') {
                warningBanner.classList.add('show');
            } else {
                warningBanner.classList.remove('show');
            }

            // Re-render
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            // Filter
            const displayProducts = currentCategory === 'Hammasi'
                ? allProducts
                : allProducts.filter(p => p.category === currentCategory);

            if (displayProducts.length === 0) {
                grid.innerHTML = '<div style="grid-column: span 2; text-align: center; margin-top: 40px; color: var(--hint-color);">Bu turkumda mahsulot topilmadi.</div>';
                return;
            }

            displayProducts.forEach(p => {
                const qty = cart[p.id] || 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img}" alt="${p.name}" class="product-image" onerror="this.src='https://via.placeholder.com/150/f5f5f7/888888?text=Rasm'">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${formatPrice(p.price)}</div>
                    <div class="controls">
                        <button class="btn-control" onclick="updateCart(${p.id}, -1)">-</button>
                        <span class="quantity" id="qty-${p.id}">${qty}</span>
                        <button class="btn-control" onclick="updateCart(${p.id}, 1)">+</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.updateCart = function (productId, change) {
            if (!cart[productId]) {
                cart[productId] = 0;
            }

            cart[productId] += change;

            if (cart[productId] < 0) {
                cart[productId] = 0;
            }

            // Update UI
            const qtyElement = document.getElementById(`qty-${productId}`);
            if (qtyElement) {
                qtyElement.innerText = cart[productId];
            }

            // Haptic feed
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            updateMainButton();
        }

        function updateMainButton() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const [id, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    totalItems += qty;
                    const product = allProducts.find(p => p.id == parseInt(id));
                    if (product) totalPrice += product.price * qty;
                }
            }

            if (totalItems > 0) {
                tg.MainButton.setText(`BUYURTMA BERISH (${formatPrice(totalPrice)})`);
                tg.MainButton.color = '#0071e3';
                tg.MainButton.textColor = '#ffffff';
                if (!tg.MainButton.isVisible) tg.MainButton.show();
            } else {
                if (tg.MainButton.isVisible) tg.MainButton.hide();
            }
        }

        Telegram.WebApp.onEvent('mainButtonClicked', function () {
            const items = [];
            let totalPrice = 0;

            for (const [id, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const product = allProducts.find(p => p.id == parseInt(id));
                    if (product) {
                        items.push({
                            id: product.id,
                            name: product.name,
                            price: product.price,
                            quantity: qty
                        });
                        totalPrice += product.price * qty;
                    }
                }
            }

            // Prepare OrderData properly structured
            const orderData = {
                items: items,
                totalPrice: totalPrice,
                timestamp: new Date().toISOString()
            };

            // Note: Sending JSON.stringify(orderData) expects bot to receive an Object instead of an Array now.
            // Since our OlmaTelegramBot currently parses List<Map>, we fall back to sending pure array if strictly needed,
            // OR update the JS to match what the bot expects. BUT user explicitly requested:
            // "orderData must contain: items (list of name, price, qty), totalPrice, and a timestamp."
            tg.sendData(JSON.stringify(orderData));
        });

        // Initialize
        renderProducts();
        tg.ready();
    </script>
</body>

</html>
